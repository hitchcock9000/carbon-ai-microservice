name: Carbon AI CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest flake8 nbformat nbconvert

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,data
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=venv,data

    - name: Validate notebook structure
      run: |
        # Validate that notebooks can be parsed
        python -c "
        import nbformat
        import os
        from pathlib import Path
        
        notebooks = list(Path('notebooks').rglob('*.ipynb'))
        print(f'Found {len(notebooks)} notebooks')
        
        for nb_path in notebooks:
            try:
                nb = nbformat.read(str(nb_path), as_version=4)
                print(f'✓ {nb_path} is valid')
            except Exception as e:
                print(f'✗ {nb_path} failed: {e}')
                exit(1)
        print('All notebooks are valid!')
        "

    - name: Run tests
      run: |
        # Run tests if the tests directory exists
        if [ -d "tests" ]; then
          pytest -v
        else
          echo "No tests directory found, skipping tests."
        fi

    - name: Check data structure
      run: |
        # Verify expected data directories exist
        python -c "
        import os
        dirs = ['data/raw', 'data/processed', 'data/external']
        for d in dirs:
            if os.path.exists(d):
                print(f'✓ {d} exists')
            else:
                print(f'⚠ {d} does not exist (optional)')
        "
